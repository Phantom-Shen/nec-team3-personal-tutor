<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 350px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; margin: 0; background: #f9f9f9; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
    .header h2 { margin: 0; font-size: 18px; color: #333; }
    #chat-container { height: 300px; overflow-y: auto; border: 1px solid #eee; background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 12px; font-size: 14px; max-width: 85%; }
    .user { background: #007bff; color: white; align-self: flex-end; margin-left: auto; }
    .tutor { background: #e9ecef; color: #333; }
    .thinking { 
      font-style: italic; 
      color: #888; 
      padding: 5px 12px; 
      font-size: 13px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
    .mastery-card { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 12px; }
    .mastery-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-top: 5px; }
    .mastery-fill { height: 100%; background: #4caf50; transition: width 0.3s; }
    .input-area { display: flex; gap: 8px; }
    input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
    button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <div class="header">
    <h2>&#127891; Personal Tutor</h2>
    <span id="tutor-mode" style="font-size: 10px; padding: 2px 6px; border-radius: 10px; background: #eee; margin-left: auto;">Mode: Initializing...</span>
  </div>
  
  <div id="mastery-dashboard"></div>
  <div id="activity-log" style="font-size: 11px; color: #666; margin-bottom: 10px; max-height: 60px; overflow-y: auto; border-bottom: 1px solid #eee; padding-bottom: 5px;"></div>
  <div id="chat-container"></div>
  
  <div class="input-area">
    <input type="text" id="user-input" placeholder="Ask a question about the course...">
    <button id="send-btn">Send</button>
  </div>

  <script src="../src/scripts/popup.js"></script>
</body>
</html>
